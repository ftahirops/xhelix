# Process plane rules. See docs/RULES.md for grammar.
---
id: web_server_spawns_shell
desc: A web server worker spawned an interactive shell
severity: high
mitre: [T1059.004, T1190]
match: |
  event.sensor == "ebpf.proc" &&
  event.tags["parent_comm"] in ["nginx", "apache2", "httpd", "php-fpm", "caddy", "haproxy", "lighttpd"] &&
  event.comm in ["bash", "sh", "dash", "zsh", "ash", "ksh"]
tags: [post_exploitation, web]
remediation: |
  Investigate the web request that triggered this. A web server
  should never fork an interactive shell in normal operation.
test_id: K-01
---
id: binary_runs_from_tmp
desc: A binary in /tmp, /var/tmp, or /dev/shm was invoked
severity: warn
mitre: [T1059, T1204.002]
match: |
  event.sensor == "ebpf.proc" &&
  (event.image.startsWith("/tmp/") ||
   event.image.startsWith("/var/tmp/") ||
   event.image.startsWith("/dev/shm/"))
tags: [post_exploitation, dropper]
remediation: Capture and hash the binary; check it against threat-intel.
test_id: K-03
---
id: uid0_no_transition
desc: Process gained uid 0 without observed setuid transition
severity: critical
mitre: [T1068, T1548.001]
match: |
  event.sensor == "ebpf.proc.cred" &&
  event.tags["new_uid"] == "0" &&
  event.tags["old_uid"] != "0" &&
  !("setuid_binary" in event.tags) &&
  !("legitimate_su" in event.tags)
tags: [privilege_escalation]
remediation: |
  Possible kernel exploit or cred-struct corruption. Snapshot
  process memory; check dmesg for kernel oops; run integrity scan.
test_id: K-02
---
id: ptrace_sensitive_target
desc: ptrace attached to sshd, init, systemd, or the agent itself
severity: critical
mitre: [T1055.008, T1003]
match: |
  event.sensor == "ebpf.proc" &&
  event.tags["ptrace_attach"] == "true" &&
  event.tags["ptrace_target"] in ["sshd", "systemd", "init", "xhelix"]
tags: [credential_access, defense_evasion]
remediation: Investigate immediately. Possible memory injection or credential dump.
test_id: K-05
---
id: memfd_run_pattern
desc: Process invoked from memfd (fileless)
severity: high
mitre: [T1055.009, T1620]
match: |
  event.sensor == "ebpf.proc" &&
  (event.image.startsWith("/proc/self/fd/") ||
   event.tags["from_memfd"] == "true")
tags: [defense_evasion, fileless]
remediation: Fileless payload. Capture memory of the running pid.
test_id: S-01
---
id: shell_with_socket_fd
desc: Shell started with stdin or stdout pointing at a TCP socket
severity: critical
mitre: [T1059, T1041]
match: |
  event.sensor == "ebpf.proc" &&
  event.comm in ["bash", "sh", "dash"] &&
  (event.tags["stdin_is_socket"] == "true" ||
   event.tags["stdout_is_socket"] == "true")
tags: [post_exploitation, c2]
remediation: Reverse shell pattern. Identify peer; isolate host; snapshot.
test_id: S-01
---
id: kernel_module_load
desc: A kernel module was loaded
severity: warn
mitre: [T1547.006]
match: |
  event.sensor == "ebpf.module" &&
  event.tags["mod_load"] == "true"
tags: [persistence, defense_evasion]
remediation: Module loads on stable systems are rare. Verify expected baseline.
---
id: bpf_syscall_unexpected
desc: A non-allowlisted process used the bpf syscall
severity: high
mitre: [T1562]
match: |
  event.sensor == "ebpf.self" &&
  event.tags["bpf_syscall"] == "true"
tags: [defense_evasion]
remediation: Possible attempt to detach or load BPF programs. Investigate.
test_id: SD-02
---
id: container_escape_mount
desc: A container mounted the host filesystem
severity: critical
mitre: [T1611]
match: |
  event.sensor == "ebpf.proc" &&
  event.container != "" &&
  event.tags["mount_target"].startsWith("/proc/1/root")
tags: [container, escape]
remediation: Container escape attempt. Stop the container; capture image.
test_id: S-05
---
id: download_then_run
desc: A binary newly seen on disk was invoked from a download tool ancestor
severity: high
mitre: [T1105, T1059]
match: |
  event.sensor == "ebpf.proc" &&
  event.tags["first_seen_image"] == "true" &&
  size(tree) > 1 &&
  tree.exists(p, p.comm in ["curl", "wget", "fetch"])
tags: [post_exploitation, dropper]
remediation: Inspect the URL the downloader contacted and the dropped binary.
test_id: K-04
---
# ─── P-AB.7 backbone-persistence pack ──────────────────────────
id: ssh_tunnel_listener
desc: SSH invoked with port-forwarding flags (-R / -L / -D)
severity: high
mitre: [T1572, T1090.001]
match: |
  event.sensor == "ebpf.proc" &&
  event.tags["kind"] == "proc_spawn" &&
  event.comm in ["ssh", "sshd", "autossh"] &&
  size(event.argv) > 1 &&
  event.argv.exists(a, a.startsWith("-R") || a.startsWith("-L") || a.startsWith("-D"))
tags: [post_exploitation, c2]
remediation: |
  SSH port-forwards are a classic stealthy C2 / lateral-movement
  channel — encrypted, uses an existing trusted process, often
  survives reboot via systemd. -R = reverse (most suspicious;
  attacker opens a port on your host from theirs), -D = SOCKS
  proxy. Inspect the user, the remote endpoint, the systemd unit
  if any.
test_id: NET-02
---
id: web_user_runs_db_client
desc: A database client was invoked by a webserver / php-fpm worker
severity: high
mitre: [T1059, T1505]
match: |
  event.sensor == "ebpf.proc" &&
  event.tags["kind"] == "proc_spawn" &&
  event.comm in ["mysql", "mysqldump", "psql", "mongo", "mongodump", "redis-cli"] &&
  event.tags["parent_comm"] in ["nginx", "apache2", "httpd", "php-fpm", "caddy", "lighttpd"]
tags: [post_exploitation, credential_access, web]
remediation: |
  A web worker spawning a DB client almost always means RCE via
  PHP system()/exec(). Legitimate apps use the DB driver, not the
  shell client. Inspect the request that triggered this and the
  client's argv (-e '<sql>' often contains the payload).
test_id: K-06
---
id: env_secret_read_by_web
desc: A web worker opened a known secret file (.env / wp-config.php / config.php)
severity: warn
mitre: [T1552.001]
match: |
  event.sensor == "ebpf.proc" &&
  event.tags["kind"] == "file_open" &&
  event.tags["parent_comm"] in ["nginx", "apache2", "httpd", "php-fpm"] &&
  (event.tags["path"].endsWith("/.env") ||
   event.tags["path"].endsWith("/wp-config.php") ||
   event.tags["path"].endsWith("/configuration.php") ||
   event.tags["path"].endsWith("/config.inc.php") ||
   event.tags["path"].endsWith("/settings.php"))
tags: [credential_access, web]
remediation: |
  Legitimate workers DO read these files at startup. The signal is
  WHEN — repeated reads from a single PID mid-request, or reads
  outside startup, suggest exfil. Correlate against autobaseline
  (post-seal: a worker reading these mid-request is novel).
test_id: K-07
---
# ─── P-AB.11 memory-execution detection (Doc 2 gaps) ──────────
id: deleted_binary_running
desc: Process is executing from a binary the kernel reports as (deleted)
severity: critical
mitre: [T1070.004, T1620]
match: |
  event.sensor == "procmem" &&
  event.tags["kind"] == "deleted_exe"
tags: [post_exploitation, dropper, fileless]
remediation: |
  Classic dropper pattern: the binary was unlinked while the
  process kept running. Common with "curl|sh && rm self", memfd
  replay loaders, and packed-payload chains. The unlink hides the
  artefact from forensic file-system scans but the loaded text
  segment is still in memory. Capture process memory before kill.
  Pair with autobaseline's baseline_known check — if the image is
  in the sealed profile it's likely a benign self-update; if not,
  treat as live compromise.
test_id: PMEM-01
---
id: thread_outside_module
desc: A thread is executing from anonymous (non-file-backed) memory
severity: critical
mitre: [T1055, T1620]
match: |
  event.sensor == "procmem" &&
  event.tags["kind"] == "thread_outside_module"
tags: [post_exploitation, injection, fileless]
remediation: |
  The thread's current PC is inside an anonymous executable
  mapping, not in any loaded shared library or main binary. This
  is the steady-state signature of injected shellcode — reflective
  DLL/.so loaders, Cobalt Strike beacons, Sliver implants, Meterp
  payloads. JIT runtimes (Java, Node, .NET, PyPy) legitimately
  produce this and are exempted via the runtime allowlist. If
  this fires on a non-JIT binary (nginx, sshd, mysqld, an app
  worker), treat as near-certain compromise and capture
  /proc/<pid>/maps + /proc/<pid>/mem region around the offending
  PC immediately.
test_id: PMEM-02
