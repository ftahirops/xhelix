# File / FIM plane rules.
---
id: tamper_passwd
desc: Write to /etc/passwd (or any /passwd file under a watched dir)
severity: critical
mitre: [T1098, T1136]
match: |
  (event.sensor == "fim" || event.sensor == "fim.drift") &&
  (path == "/etc/passwd" || path.endsWith("/etc/passwd") || path.endsWith("/passwd"))
tags: [persistence, credential_access]
remediation: Compare diff against backup; identify writer pid and uid.
test_id: F-01
---
id: tamper_shadow
desc: Write to /etc/shadow from a non-system tool
severity: critical
mitre: [T1098]
match: |
  (event.sensor == "fim" || event.sensor == "fim.drift") &&
  (path == "/etc/shadow" || path.endsWith("/etc/shadow") || path.endsWith("/shadow")) &&
  !(event.comm in ["passwd", "chpasswd", "useradd", "usermod", "userdel", "vipw"])
tags: [credential_access]
remediation: Only the listed system tools should write shadow. Investigate.
test_id: F-01
---
id: ld_so_preload_modified
desc: /etc/ld.so.preload was created or modified (classic rootkit)
severity: critical
mitre: [T1574.006]
match: |
  (event.sensor == "fim" || event.sensor == "fim.drift") &&
  (path == "/etc/ld.so.preload" || path.endsWith("/ld.so.preload"))
tags: [persistence, hijack]
remediation: Classic rootkit technique. Capture the file; identify the writer.
test_id: F-02
---
id: ssh_key_added_root
desc: New entry added to root's authorized_keys
severity: high
mitre: [T1098.004]
match: |
  event.sensor == "fim" &&
  path == "/root/.ssh/authorized_keys" &&
  event.tags["write"] == "true" &&
  !(event.comm in ["sshd", "ssh-copy-id"])
tags: [persistence, credential_access]
remediation: Diff against backup. Identify new public-key fingerprint.
test_id: F-03
---
id: ssh_key_added_user
desc: New authorized_keys entry on any user account
severity: warn
mitre: [T1098.004]
match: |
  event.sensor == "fim" &&
  path.matches("^/home/[^/]+/.ssh/authorized_keys$") &&
  event.tags["write"] == "true" &&
  !(event.comm in ["sshd", "ssh-copy-id"])
tags: [persistence]
remediation: Verify the user added the key intentionally.
test_id: F-03
---
id: pam_module_drop
desc: New shared object placed in PAM module directory
severity: critical
mitre: [T1556.003]
match: |
  event.sensor == "fim" &&
  (path.startsWith("/lib/security/") ||
   path.startsWith("/lib64/security/") ||
   path.startsWith("/usr/lib/security/") ||
   path.startsWith("/usr/lib64/security/")) &&
  path.endsWith(".so") &&
  event.tags["create"] == "true"
tags: [persistence, credential_access]
remediation: Backdoor PAM module. Identify writer; hash file; check vs package manifest.
test_id: F-04
---
id: cron_new_unit
desc: New cron job created
severity: high
mitre: [T1053.003]
match: |
  event.sensor == "fim" &&
  (path.startsWith("/etc/cron.") ||
   path == "/etc/crontab" ||
   path.startsWith("/var/spool/cron/")) &&
  event.tags["create"] == "true"
tags: [persistence]
remediation: Verify against ops change log; cron implants are common.
test_id: FIM-02
---
id: systemd_unit_new
desc: New systemd unit installed outside the package manager
severity: high
mitre: [T1543.002]
match: |
  event.sensor == "fim" &&
  path.startsWith("/etc/systemd/system/") &&
  event.tags["create"] == "true" &&
  event.tags["package_managed"] != "true"
tags: [persistence]
remediation: Inspect unit file ExecStart and User= directive.
test_id: FIM-02
---
id: package_diff_critical_binary
desc: A critical system binary differs from package manifest
severity: critical
mitre: [T1554]
match: |
  event.sensor == "fim.posture" &&
  event.tags["package_diff"] == "true" &&
  event.tags["binary"] in ["/usr/bin/sudo", "/bin/su", "/usr/sbin/sshd",
                           "/usr/bin/ssh", "/bin/login", "/usr/bin/passwd"]
tags: [persistence, defense_evasion]
remediation: Possible backdoored system binary. Reinstall package; capture altered.
test_id: FIM-01
---
id: webshell_heuristic
desc: PHP/JSP file in web root contains code-execution patterns
severity: high
mitre: [T1505.003]
match: |
  event.sensor == "fim.scanner" &&
  event.tags["webshell_match"] == "true" &&
  int(event.tags["score"]) >= 5
tags: [persistence, web]
remediation: Inspect file content; correlate with web access logs.
test_id: FIM-03
---
# ─── P-AB.7 backbone-persistence pack ──────────────────────────
id: user_crontab_modified
desc: A per-user crontab was created or modified
severity: high
mitre: [T1053.003]
match: |
  event.sensor == "fim" &&
  (path.startsWith("/var/spool/cron/crontabs/") ||
   path.matches("^/var/spool/cron/[^/]+$"))
tags: [persistence]
remediation: |
  Per-user crontabs are a top-10 re-entry vector. Check the
  ownership of the file vs the named user; cron entries can include
  `MAILTO=` to hide output. `crontab -u <user> -l` shows the entry.
test_id: FIM-04
---
id: shell_rc_modified
desc: A system or per-user shell-startup file was modified
severity: high
mitre: [T1546.004]
match: |
  event.sensor == "fim" &&
  (path == "/etc/bash.bashrc" ||
   path == "/etc/bashrc" ||
   path == "/etc/profile" ||
   path == "/etc/zshrc" ||
   path == "/etc/zsh/zshrc" ||
   path == "/etc/zsh/zlogin" ||
   path == "/etc/zsh/zprofile" ||
   path == "/etc/zsh/zshenv" ||
   path.matches("^/(root|home/[^/]+)/\\.(bashrc|bash_profile|bash_login|profile|zshrc|zshenv|zprofile|bash_logout)$"))
tags: [persistence, hijack]
remediation: |
  Shell rc files run on every interactive login. Diff against
  backup or package manifest. Common implant pattern: a single
  appended line that curls + bashes a payload.
test_id: FIM-04
---
id: profile_d_dropped
desc: New file dropped into /etc/profile.d
severity: high
mitre: [T1546.004]
match: |
  event.sensor == "fim" &&
  path.startsWith("/etc/profile.d/") &&
  event.tags["create"] == "true"
tags: [persistence, hijack]
remediation: |
  Anything in /etc/profile.d runs for every shell login system-wide.
  Inspect contents. Real package installs do drop here (e.g.
  bash_completion); diff against `dpkg -S` / `rpm -qf`.
test_id: FIM-04
---
id: rc_local_modified
desc: /etc/rc.local or sysv init script was modified
severity: high
mitre: [T1037.004]
match: |
  event.sensor == "fim" &&
  (path == "/etc/rc.local" ||
   path.startsWith("/etc/init.d/") ||
   path.startsWith("/etc/rc.d/"))
tags: [persistence]
remediation: |
  rc.local and init.d scripts still run on most distros. Common
  legacy persistence path. Diff and verify ExecStart equivalents.
test_id: FIM-04
---
id: xdg_autostart_dropped
desc: New .desktop file in an XDG autostart directory
severity: high
mitre: [T1547.013]
match: |
  event.sensor == "fim" &&
  (path.startsWith("/etc/xdg/autostart/") ||
   path.matches("^/(root|home/[^/]+)/\\.config/autostart/")) &&
  path.endsWith(".desktop") &&
  event.tags["create"] == "true"
tags: [persistence]
remediation: |
  XDG autostart .desktop entries run on next graphical login.
  Mostly desktop, but jump-host bastions running X also hit this.
test_id: FIM-04
---
id: hosts_allow_deny_modified
desc: tcpwrappers hosts.allow / hosts.deny was modified
severity: warn
mitre: [T1562.004]
match: |
  event.sensor == "fim" &&
  (path == "/etc/hosts.allow" || path == "/etc/hosts.deny")
tags: [defense_evasion]
remediation: |
  Adding ALL: ALL to hosts.allow is a quick way for an attacker to
  re-open access blocked by a downstream firewall. Diff vs backup.
test_id: FIM-04
---
id: sysctl_drift
desc: A sysctl tunable file was modified (kernel-policy drift)
severity: warn
mitre: [T1562.001]
match: |
  event.sensor == "fim" &&
  (path == "/etc/sysctl.conf" || path.startsWith("/etc/sysctl.d/"))
tags: [defense_evasion]
remediation: |
  Common abuse: setting kptr_restrict=0 / yama.ptrace_scope=0 /
  kernel.unprivileged_bpf_disabled=0 to enable later exploitation
  steps. Diff vs the package's shipped value.
test_id: FIM-04
---
id: ssh_login_hook_dropped
desc: SSH per-account login hook (.ssh/rc) was created or modified
severity: high
mitre: [T1546]
match: |
  event.sensor == "fim" &&
  path.matches("^/(root|home/[^/]+)/\\.ssh/rc$")
tags: [persistence]
remediation: |
  .ssh/rc runs after every SSH login for that user. Undocumented
  in most cheatsheets, hence popular with attackers. Inspect.
test_id: FIM-04
---
id: ld_so_conf_modified
desc: Dynamic linker search path config was modified
severity: high
mitre: [T1574.006]
match: |
  event.sensor == "fim" &&
  (path == "/etc/ld.so.conf" || path.startsWith("/etc/ld.so.conf.d/")) &&
  event.tags["package_managed"] != "true"
tags: [persistence, hijack]
remediation: |
  Adding a writable directory to the linker search path lets the
  attacker plant a same-named .so that gets loaded by any binary.
  Real package installs do drop here; gate on package_managed.
test_id: FIM-04
---
id: webroot_bootstrap_modified
desc: A CMS / web-app bootstrap file was modified (wp-config.php, .htaccess, configuration.php)
severity: high
mitre: [T1505, T1505.003]
match: |
  event.sensor == "fim" &&
  (path.endsWith("/wp-config.php") ||
   path.endsWith("/.htaccess") ||
   path.endsWith("/configuration.php") ||
   path.endsWith("/config.inc.php")) &&
  event.tags["write"] == "true"
tags: [persistence, web]
remediation: |
  Highest-leverage file in any tenant webroot. wp-config.php holds
  DB creds + table_prefix + AUTH_KEY. .htaccess can redirect / RCE.
  Diff against last known-good (FIM keeps inode + hash history).
test_id: FIM-04
---
id: webroot_mu_plugin_dropped
desc: New PHP file in WordPress mu-plugins (auto-loaded, no admin UI to disable)
severity: critical
mitre: [T1505]
match: |
  event.sensor == "fim" &&
  path.matches("/wp-content/mu-plugins/.*\\.php$") &&
  event.tags["create"] == "true"
tags: [persistence, web]
remediation: |
  MU-plugins run on every request and don't appear in the WP plugins
  admin page. Top-3 WordPress persistence vector. Capture the file,
  hash it, check the source webserver request that wrote it.
test_id: FIM-04
---
id: docker_compose_modified
desc: A docker-compose.yml was modified outside the package manager
severity: high
mitre: [T1610]
match: |
  event.sensor == "fim" &&
  (path.endsWith("/docker-compose.yml") ||
   path.endsWith("/docker-compose.yaml")) &&
  event.tags["package_managed"] != "true"
tags: [persistence, container]
remediation: |
  Adding `volumes: ["/:/host"]` or `privileged: true` to a compose
  service is a one-line container escape. Diff vs git / backup.
test_id: FIM-04
---
id: kube_manifest_modified
desc: A static kubelet manifest was modified
severity: critical
mitre: [T1610]
match: |
  event.sensor == "fim" &&
  path.startsWith("/etc/kubernetes/manifests/") &&
  (path.endsWith(".yaml") || path.endsWith(".yml"))
tags: [persistence, container]
remediation: |
  Static pods specified in /etc/kubernetes/manifests run with
  kubelet's authority — bypasses RBAC. Diff carefully.
test_id: FIM-04
---
id: boot_artifact_modified
desc: A file under /boot (vmlinuz / initrd / grub) was modified
severity: critical
mitre: [T1542.003]
match: |
  event.sensor == "fim" &&
  path.startsWith("/boot/") &&
  event.tags["package_managed"] != "true"
tags: [persistence, rootkit]
remediation: |
  Bootloader / kernel-image tamper is the highest-leverage
  persistence — survives userland wipes. Real package upgrades
  (linux-image-*) do drop here; gate on package_managed and
  treat the rest as critical. Capture inode + hash.
test_id: FIM-05
---
id: kernel_module_dropped
desc: A new .ko file was placed under /lib/modules
severity: critical
mitre: [T1547.006]
match: |
  event.sensor == "fim" &&
  (path.startsWith("/lib/modules/") || path.startsWith("/usr/lib/modules/")) &&
  path.endsWith(".ko") &&
  event.tags["create"] == "true" &&
  event.tags["package_managed"] != "true"
tags: [persistence, rootkit]
remediation: |
  Out-of-tree kernel module drop. Capture, hash, check signature.
  Pair with the kernel_module_load rule (which fires when one
  actually loads).
test_id: FIM-05
---
id: cron_malware_shape
desc: Cron entry has a malware-shaped command (shell-pipe / remote-fetch / tmp script / web-user / hidden script)
severity: critical
mitre: [T1053.003, T1059]
match: |
  event.sensor == "fim" &&
  has(event.tags["cron_suspicion"]) &&
  int(event.tags["cron_suspicion"]) >= 50
tags: [persistence, post_exploitation]
remediation: |
  The classifier scored this cron file >=50/100 on malware-shape
  heuristics. Inspect: cron_owner, cron_tmp_path, command shape
  (cron_shell_pipe / cron_remote_fetch / cron_b64 / cron_hidden_script).
  If cron_added_by_web=true OR cron_owner_mismatch=true treat as
  near-certain post-exploitation.
test_id: FIM-04
---
id: cron_web_user_added
desc: Cron file owned by a web/service user (almost-certain RCE)
severity: critical
mitre: [T1053.003]
match: |
  event.sensor == "fim" &&
  event.tags["cron_added_by_web"] == "true"
tags: [persistence, post_exploitation, web]
remediation: |
  www-data / apache / nginx / php-fpm / mysql adding a cron entry
  is near-certain post-exploitation via web RCE. Legitimate web
  workers do not crontab. Capture the file, dump the offending
  request from access logs, snapshot the parent process.
test_id: FIM-04
