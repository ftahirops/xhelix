name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race -count=1 ./...
      - name: build
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o xhelix ./cmd/xhelix
          CGO_ENABLED=0 go build -ldflags="-s -w" -o xhelixctl ./cmd/xhelixctl
      - name: static-binary check
        run: |
          file ./xhelix | grep -q "statically linked"
          file ./xhelixctl | grep -q "statically linked"
